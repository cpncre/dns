<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare DNS记录管理工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4b5563;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .success {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #065f46;
        }
        
        .error {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #7f1d1d;
        }
        
        .info-box {
            background: #f0f9ff;
            border: 2px solid #0ea5e9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .info-box h3 {
            color: #0369a1;
            margin-bottom: 10px;
        }
        
        .info-box ul {
            padding-left: 20px;
        }
        
        .info-box li {
            margin-bottom: 8px;
        }
        
        .code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-x: auto;
            margin-top: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .record-list {
            margin-top: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .record-item {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .record-item:hover {
            background-color: #f9fafb;
        }
        
        .record-item:last-child {
            border-bottom: none;
        }
        
        .record-name {
            font-weight: 600;
            color: #1f2937;
        }
        
        .record-type {
            display: inline-block;
            background: #e0e7ff;
            color: #4f46e5;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .record-content {
            color: #6b7280;
            font-size: 14px;
        }
        
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌩️ Cloudflare DNS记录管理工具</h1>
            <p>无需登录控制面板，直接通过API令牌管理DNS记录</p>
        </div>
        
        <div class="content">
            <div class="info-box">
                <h3>📋 使用说明</h3>
                <ul>
                    <li><strong>API令牌获取</strong>：登录Cloudflare控制面板 → 我的个人资料 → API令牌 → 创建令牌 → 选择"编辑区域DNS"模板</li>
                    <li><strong>区域ID获取</strong>：在域名的概述页面右侧找到"区域ID"</li>
                    <li><strong>记录选择</strong>：输入域名后点击"获取DNS记录"，从列表中选择要修改的记录</li>
                    <li><strong>重要提示</strong>：请妥善保管您的API令牌，不要分享给他人</li>
                </ul>
            </div>
            
            <form id="dnsForm">
                <div class="form-group">
                    <label for="apiToken">API令牌 *</label>
                    <input type="password" id="apiToken" placeholder="输入您的Cloudflare API令牌" required>
                </div>
                
                <div class="form-group">
                    <label for="zoneId">区域ID (Zone ID) *</label>
                    <input type="text" id="zoneId" placeholder="例如: 023e105f4ecef8ad9ca31a8372d0c353" required>
                </div>
                
                <div class="form-group">
                    <button type="button" class="btn" id="fetchRecordsBtn" style="background: #10b981;">
                        获取DNS记录
                    </button>
                </div>
                
                <div class="form-group" id="recordSelectionGroup" style="display: none;">
                    <label for="selectedRecord">选择要修改的记录 *</label>
                    <select id="selectedRecord" required>
                        <option value="">-- 请选择记录 --</option>
                    </select>
                </div>
                
                <div class="record-list" id="recordList" style="display: none;"></div>
                
                <div class="form-row" id="editFields" style="display: none;">
                    <div class="form-group">
                        <label for="recordType">记录类型 *</label>
                        <select id="recordType" required>
                            <option value="A">A (IPv4地址)</option>
                            <option value="AAAA">AAAA (IPv6地址)</option>
                            <option value="CNAME">CNAME (别名)</option>
                            <option value="MX">MX (邮件交换)</option>
                            <option value="TXT">TXT (文本记录)</option>
                            <option value="NS">NS (域名服务器)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="ttl">TTL (生存时间)</label>
                        <select id="ttl">
                            <option value="1">自动</option>
                            <option value="120">120秒</option>
                            <option value="300" selected>300秒</option>
                            <option value="600">600秒</option>
                            <option value="3600">3600秒 (1小时)</option>
                            <option value="7200">7200秒 (2小时)</option>
                            <option value="14400">14400秒 (4小时)</option>
                            <option value="28800">28800秒 (8小时)</option>
                            <option value="43200">43200秒 (12小时)</option>
                            <option value="86400">86400秒 (24小时)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row" id="nameContentFields" style="display: none;">
                    <div class="form-group">
                        <label for="recordName">记录名称 *</label>
                        <input type="text" id="recordName" placeholder="例如: www 或 @ (根域名)" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="recordContent">记录内容 *</label>
                        <input type="text" id="recordContent" placeholder="例如: 192.0.2.1 或 example.com" required>
                    </div>
                </div>
                
                <div class="form-group" id="proxiedField" style="display: none;">
                    <div class="checkbox-group">
                        <input type="checkbox" id="proxied" checked>
                        <label for="proxied">通过Cloudflare代理 (橙色云)</label>
                    </div>
                </div>
                
                <button type="submit" class="btn" id="submitBtn" style="display: none;">更新DNS记录</button>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在处理请求，请稍候...</p>
            </div>
            
            <div class="result" id="result"></div>
        </div>
    </div>
    
    <script>
        let currentRecords = [];
        
        // 获取DNS记录
        document.getElementById('fetchRecordsBtn').addEventListener('click', async function() {
            const apiToken = document.getElementById('apiToken').value;
            const zoneId = document.getElementById('zoneId').value;
            
            if (!apiToken || !zoneId) {
                showResult('请输入API令牌和区域ID', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records`, {
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentRecords = result.result;
                    displayRecords(currentRecords);
                    document.getElementById('recordSelectionGroup').style.display = 'block';
                    document.getElementById('recordList').style.display = 'block';
                } else {
                    showResult('获取DNS记录失败: ' + result.errors[0].message, 'error');
                }
            } catch (error) {
                showResult('网络请求失败: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });
        
        // 显示记录列表
        function displayRecords(records) {
            const recordList = document.getElementById('recordList');
            const select = document.getElementById('selectedRecord');
            
            recordList.innerHTML = '';
            select.innerHTML = '<option value="">-- 请选择记录 --</option>';
            
            records.forEach(record => {
                // 添加到下拉列表
                const option = document.createElement('option');
                option.value = record.id;
                option.textContent = `${record.name} (${record.type})`;
                select.appendChild(option);
                
                // 添加到可视化列表
                const item = document.createElement('div');
                item.className = 'record-item';
                item.dataset.recordId = record.id;
                item.innerHTML = `
                    <div>
                        <span class="record-type">${record.type}</span>
                        <span class="record-name">${record.name}</span>
                    </div>
                    <div class="record-content">${record.content}</div>
                `;
                item.addEventListener('click', () => selectRecord(record));
                recordList.appendChild(item);
            });
            
            // 当下拉选择变化时
            select.addEventListener('change', function() {
                const recordId = this.value;
                if (recordId) {
                    const record = records.find(r => r.id === recordId);
                    if (record) {
                        selectRecord(record);
                    }
                }
            });
        }
        
        // 选择记录
        function selectRecord(record) {
            document.getElementById('selectedRecord').value = record.id;
            
            // 填充表单字段
            document.getElementById('recordType').value = record.type;
            document.getElementById('recordName').value = record.name;
            document.getElementById('recordContent').value = record.content;
            document.getElementById('ttl').value = record.ttl.toString();
            document.getElementById('proxied').checked = record.proxied;
            
            // 显示编辑字段
            document.getElementById('editFields').style.display = 'grid';
            document.getElementById('nameContentFields').style.display = 'grid';
            document.getElementById('proxiedField').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'block';
            
            // 滚动到编辑区域
            document.getElementById('editFields').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 表单提交
        document.getElementById('dnsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const apiToken = document.getElementById('apiToken').value;
            const zoneId = document.getElementById('zoneId').value;
            const recordId = document.getElementById('selectedRecord').value;
            const recordType = document.getElementById('recordType').value;
            const recordName = document.getElementById('recordName').value;
            const recordContent = document.getElementById('recordContent').value;
            const ttl = document.getElementById('ttl').value;
            const proxied = document.getElementById('proxied').checked;
            
            if (!recordId) {
                showResult('请先选择要修改的记录', 'error');
                return;
            }
            
            showLoading(true);
            document.getElementById('submitBtn').disabled = true;
            
            try {
                const requestData = {
                    type: recordType,
                    name: recordName,
                    content: recordContent,
                    proxied: proxied
                };
                
                if (ttl !== '1') {
                    requestData.ttl = parseInt(ttl);
                }
                
                const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records/${recordId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult(`
                        <h3>✅ DNS记录更新成功！</h3>
                        <p><strong>记录名称：</strong>${result.result.name}</p>
                        <p><strong>记录类型：</strong>${result.result.type}</p>
                        <p><strong>记录内容：</strong>${result.result.content}</p>
                        <p><strong>TTL：</strong>${result.result.ttl}秒</p>
                        <p><strong>代理状态：</strong>${result.result.proxied ? '已启用' : '未启用'}</p>
                        <p><strong>更新时间：</strong>${new Date(result.result.modified_on).toLocaleString('zh-CN')}</p>
                    `, 'success');
                } else {
                    showResult('更新失败: ' + result.errors[0].message, 'error');
                }
            } catch (error) {
                showResult('网络请求失败: ' + error.message, 'error');
            } finally {
                showLoading(false);
                document.getElementById('submitBtn').disabled = false;
            }
        });
        
        // 显示结果
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
        }
        
        // 显示/隐藏加载状态
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
